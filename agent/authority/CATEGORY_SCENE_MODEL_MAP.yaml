# Category → visual auto-adapt map (Owner Growth Pack, Phase C — WRNA techniques).
#
# Data-driven background + human-model directives for the WRNA IMG presets
# (CGI_COMMERCIAL_FLOAT floating elements · ECOM_LIFESTYLE_MODEL background/model)
# and the ADS poster recipe. Consumed ONLY by those new surfaces — existing
# presets/recipes never read this file. Matching is normalized contains-match on
# the product category/name; unknown categories fail closed to `default`.
schema_version: category-scene-model-map-v1

default:
  background: a clean neutral premium studio surface with soft directional light
  model: a Malaysian adult presenter with modest commercial styling
  float_elements: subtle abstract light streaks and soft depth particles that reinforce a premium feel

categories:
  - match: [food, beverage, makanan, minuman, snack, drink, spaghetti, coffee, tea]
    background: a bright modern Malaysian home kitchen counter with warm appetizing light
    model: a neutral adult presenter; preserve approved avatar or uploaded-reference identity and use an operator-selected food-preparation role only when supplied
    float_elements: real ingredients and appetizing texture elements true to the product flavour

  - match: [beauty, skincare, kecantikan, personal care, cosmetic, serum, soap, fragrance, perfume, pewangi]
    background: an elegant vanity table with soft glow lighting and clean reflections
    model: a Malaysian adult presenter with polished commercial styling; preserve approved avatar or uploaded-reference identity and do not infer religious attire
    float_elements: smooth gradients, glass textures, and a subtle premium glow

  - match: [haircare, shampoo, rambut]
    background: a bright modern bathroom shelf with soft backlight
    model: a neutral adult presenter; preserve approved avatar or uploaded-reference identity and use an operator-selected haircare role only when supplied
    float_elements: flowing hair strands and botanical elements

  - match: [health, wellness, kesihatan, herbal, minyak, oil, supplement, vitamin]
    background: a calm warm home setting with soft natural light
    model: a Malaysian adult presenter with calm trustworthy styling
    float_elements: gentle botanical leaves and soft warm light accents

  - match: [tech, electronic, gadget, smartwatch, vacuum, power, hardware, tool]
    background: a minimal modern desk or workspace setup with cool clean light
    model: a Malaysian adult presenter in smart-casual wear
    float_elements: clean light streaks and precise metallic accents

  - match: [home, kitchen, rumah, curtain, langsir, pillow, bantal, bedding, organizer, storage]
    background: a tidy modern Malaysian living space with natural daylight
    model: a Malaysian adult presenter in comfortable neat home wear
    float_elements: freshness cues like soft airflow lines and ultra-clean surfaces

  - match: [baby, bayi, diaper, lampin, toy, mainan]
    background: a soft bright nursery corner with gentle pastel light
    model: a neutral adult presenter or caregiver role only when supplied by approved product, operator, avatar, or uploaded-reference context
    float_elements: soft playful rounded forms in gentle pastel tones

  - match: [fashion, muslim, apparel, baju, tudung, shawl, jersi, seluar, kurung, sock, stokin, underwear, windbreaker]
    background: a minimal lifestyle setting with clean natural light
    model: a Malaysian model styled appropriately for the garment audience
    float_elements: gentle fabric motion and flowing textile accents

  - match: [automotive, motorcycle, kereta, car, coolant, wax]
    background: a clean modern car interior or garage bay with controlled lighting
    model: a neutral adult presenter; preserve approved avatar or uploaded-reference identity and use an operator-selected automotive role only when supplied
    float_elements: precise metallic elements and subtle motion streaks
