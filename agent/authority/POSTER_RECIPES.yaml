# POSTER RECIPES — structured poster archetypes (PR B1 foundation).
#
# SSOT for the recipe-first Poster Creative Composer. Each recipe defines
# STRUCTURE (layout, product placement, scene/style, typography, zones); copy is
# placed into the zones. Zones carry percent-based coordinates (0-100) so the
# future compositor is renderer-agnostic.
#
# SAFETY LAW: placeholders are NEUTRAL structural labels ONLY. No medical /
# disease / symptom / therapeutic wording is seeded here (no rawat/sembuh/ubat/
# penyakit/sakit/lega/pening/resdung/cure/treat/heal). Operator copy that fills
# these zones is unsafe-scanned upstream in build_draft — recipes never carry
# claims.
schema_version: poster-recipes-v1
recipes:
  - recipe_id: product_hero_night_routine
    archetype: PRODUCT_HERO
    label: "Product Hero — Night Routine"
    description: "Single product as hero in a warm bedside / night-routine scene."
    layout_template: hero_center_vertical
    product_placement: "Product centered or rule-of-thirds as the visual hero; clear negative space for copy."
    background_scene: "Warm, softly-lit bedside / nightstand setting; cozy evening ambience."
    visual_style: "Premium commercial, warm tone, shallow depth of field."
    typography_mood: "Warm, calm, rounded display headline with clean body."
    icon_guidance: "Simple line icons beside benefit chips."
    composition_rules:
      - "Hero product must remain sharp and truth-locked (label readable)."
      - "Keep the top third for the headline, the lower third for chips + CTA."
    safe_zones:
      - "9:16 vertical safe margins ~6% on all edges."
    chip_slots:
      - usp_1
      - usp_2
      - usp_3
    zones:
      - zone_id: headline
        role: HEADLINE
        source_field: hook
        x: 8
        y: 8
        w: 84
        h: 18
        align: left
        font_role: display
        max_chars: 48
        placeholder: "[Tajuk utama]"
      - zone_id: subheadline
        role: SUBHEADLINE
        source_field: subhook
        x: 8
        y: 26
        w: 84
        h: 10
        align: left
        font_role: subhead
        max_chars: 72
        placeholder: "[Sub-tajuk]"
      - zone_id: chip_1
        role: CHIP
        source_field: usp_1
        x: 8
        y: 70
        w: 84
        h: 6
        align: left
        font_role: chip
        max_chars: 36
        placeholder: "[USP 1]"
      - zone_id: chip_2
        role: CHIP
        source_field: usp_2
        x: 8
        y: 77
        w: 84
        h: 6
        align: left
        font_role: chip
        max_chars: 36
        placeholder: "[USP 2]"
      - zone_id: chip_3
        role: CHIP
        source_field: usp_3
        x: 8
        y: 84
        w: 84
        h: 6
        align: left
        font_role: chip
        max_chars: 36
        placeholder: "[USP 3]"
      - zone_id: cta
        role: CTA
        source_field: cta
        x: 8
        y: 92
        w: 60
        h: 6
        align: center
        font_role: button
        max_chars: 24
        placeholder: "[CTA]"
    negative_prompt_additions:
      - "cluttered layout"
      - "harsh clinical lighting"
    allowed_text_density:
      - low
      - medium

