# POSTER TEMPLATE TOKENS — production template contract (POSTER_BUILDER_V2).
#
# Converts the POSTER_RECIPES.yaml zone maps into renderable production
# templates: concrete typography tokens, component styles, fit policy and a
# per-recipe PRODUCT-SAFE REGION (percent rect the product hero occupies in the
# generated scene — no text zone may intersect it; each region is derived from
# the recipe's own zone map so it is non-overlapping BY CONSTRUCTION).
#
# Fonts: Bahasa Melayu is Latin-script (Rumi), fully covered by the system
# stack below — no font bundling/licensing needed for V1. The stack pins a
# deterministic priority order for reproducible rendering on the local runtime.
schema_version: poster-template-tokens-v1
template_version: "1.0.0"

font_tokens:
  display:  { family: "'Segoe UI', 'Noto Sans', Arial, sans-serif", size: 76, weight: 800, color: "#1c1c1c", line_height: 1.08, letter_spacing: "-0.5px" }
  headline: { family: "'Segoe UI', 'Noto Sans', Arial, sans-serif", size: 76, weight: 800, color: "#1c1c1c", line_height: 1.08, letter_spacing: "-0.5px" }
  subhead:  { family: "'Segoe UI', 'Noto Sans', Arial, sans-serif", size: 36, weight: 600, color: "#2e2e2e", line_height: 1.25, letter_spacing: "0px" }
  chip:     { family: "'Segoe UI', 'Noto Sans', Arial, sans-serif", size: 27, weight: 600, color: "#1f1f1f", line_height: 1.2,  letter_spacing: "0px" }
  button:   { family: "'Segoe UI', 'Noto Sans', Arial, sans-serif", size: 32, weight: 800, color: "#ffffff", line_height: 1.1,  letter_spacing: "0.5px" }
  caption:  { family: "'Segoe UI', 'Noto Sans', Arial, sans-serif", size: 20, weight: 500, color: "#4a4a4a", line_height: 1.3,  letter_spacing: "0px" }
  body:     { family: "'Segoe UI', 'Noto Sans', Arial, sans-serif", size: 28, weight: 400, color: "#2a2a2a", line_height: 1.3,  letter_spacing: "0px" }

component_styles:
  chip:
    background: "rgba(255,255,255,0.88)"
    border: "1px solid rgba(0,0,0,0.10)"
    border_radius: "999px"
    padding: "10px 22px"
    shadow: "0 4px 14px rgba(0,0,0,0.10)"
    display: inline
  cta_button:
    background: "#b23b2e"
    border_radius: "16px"
    padding: "18px 34px"
    shadow: "0 10px 26px rgba(178,59,46,0.35)"
    display: inline
  disclaimer:
    background: "transparent"
    color: "rgba(0,0,0,0.55)"
    size: 18

# Shrink-to-fit: reduce font-size by `step` (fraction of the base size) until
# the text fits its zone or `min_scale` is reached; below min_scale the zone is
# reported as overflowed (QA blocker at final approval).
fit_policy:
  min_scale: 0.6
  step: 0.05

# Per-recipe production template contract. product_safe_region is percent-based
# (x, y, w, h) and never intersects that recipe's text zones.
recipes:
  product_hero_night_routine:
    product_safe_region: { x: 15, y: 30, w: 70, h: 44 }
    palette: { text: "#1c1c1c", accent: "#b23b2e", chip_bg: "rgba(255,255,255,0.88)" }
    background_constraints: "Soft premium studio; uncluttered; clear negative space top third and lower third."
  product_scale_portability:
    product_safe_region: { x: 12, y: 24, w: 76, h: 52 }
    palette: { text: "#1c1c1c", accent: "#20614f", chip_bg: "rgba(255,255,255,0.90)" }
    background_constraints: "Clean neutral studio; single soft shadow; in-hand scale cue inside the product region."
  heritage_infographic:
    product_safe_region: { x: 14, y: 27, w: 72, h: 44 }
    palette: { text: "#3a2c18", accent: "#8a6d2f", chip_bg: "rgba(255,250,238,0.92)" }
    background_constraints: "Cream/gold heritage framing; ornamental border stays outside text zones."
  routine_use:
    product_safe_region: { x: 15, y: 30, w: 70, h: 47 }
    palette: { text: "#22303a", accent: "#3a6ea5", chip_bg: "rgba(255,255,255,0.88)" }
    background_constraints: "Warm home/lifestyle scene; product clearly visible inside the product region."
  offer_promo:
    product_safe_region: { x: 15, y: 24, w: 70, h: 51 }
    palette: { text: "#1c1c1c", accent: "#b23b2e", chip_bg: "rgba(255,255,255,0.92)" }
    background_constraints: "High-contrast clean studio; offer emphasis via copy zones, NOT baked price graphics."
  problem_aware_safe:
    product_safe_region: { x: 15, y: 30, w: 70, h: 47 }
    palette: { text: "#2b2b34", accent: "#5b5b8a", chip_bg: "rgba(255,255,255,0.88)" }
    background_constraints: "Calm warm mood scene; no clinical or before/after cues."
